name: Build and Release Standalone Executables

on:
  release:
    types: [created]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build for Windows
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable with PyInstaller
        run: |
          pyinstaller --noconsole --onefile --collect-all customtkinter --add-data "papertools_theme.json;." main.py

      - name: Rename executable
        run: |
          mv dist/main.exe dist/DSci-Windows.exe

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DSci-Windows
          path: dist/DSci-Windows.exe

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/DSci-Windows.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    name: Build for Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install system dependencies (for Tkinter on Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable with PyInstaller
        run: |
          pyinstaller --noconsole --onefile --collect-all customtkinter --add-data "papertools_theme.json:." main.py

      - name: Rename executable
        run: |
          mv dist/main dist/DSci-Linux

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DSci-Linux
          path: dist/DSci-Linux

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/DSci-Linux
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
